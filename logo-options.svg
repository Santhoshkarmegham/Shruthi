    <text x="100" y="128" text-anchor="middle" fill="#20242a" font-family="Arial, sans-serif" font-size="15" font-weight="700">D · Growth badge</text>
    <text x="100" y="149" text-anchor="middle" fill="#69717c" font-family="Arial, sans-serif" font-size="11">Bold and performance-led</text>
