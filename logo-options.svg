      <stop offset="1" stop-color="#0e1219"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#10243c" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="960" height="280" rx="24" fill="#f7f7f4"/>
  <text x="40" y="42" fill="#20242a" font-family="Arial, sans-serif" font-size="20" font-weight="700">Choose an SG icon direction</text>

  <g transform="translate(40 70)">
    <rect width="200" height="168" rx="18" fill="#fff" stroke="#dde2e9"/>
    <rect x="60" y="20" width="80" height="80" rx="22" fill="url(#blue)" filter="url(#shadow)"/>
    <text x="100" y="72" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="-2">SG</text>
    <text x="100" y="128" text-anchor="middle" fill="#20242a" font-family="Arial, sans-serif" font-size="15" font-weight="700">A · Modern tile</text>
    <text x="100" y="149" text-anchor="middle" fill="#69717c" font-family="Arial, sans-serif" font-size="11">Clear and familiar</text>
  </g>

  <g transform="translate(266 70)">
