    <text x="100" y="70" text-anchor="middle" fill="#fff" font-family="Georgia, serif" font-size="29" font-weight="700" letter-spacing="-2">SG</text>
    <text x="100" y="128" text-anchor="middle" fill="#20242a" font-family="Arial, sans-serif" font-size="15" font-weight="700">B · Signature seal</text>
    <text x="100" y="149" text-anchor="middle" fill="#69717c" font-family="Arial, sans-serif" font-size="11">Personal and premium</text>
  </g>

  <g transform="translate(492 70)">
