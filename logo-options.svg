    <path d="M118 42c-3-3-7-5-12-5-11 0-18 8-18 19s7 19 18 19c5 0 9-1 13-4V57h-14" fill="none" stroke="#172333" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
